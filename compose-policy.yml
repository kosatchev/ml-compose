deny_privileged: true
deny_docker_sock: true
deny_pid_host: true
deny_cgroup_host: true
deny_userns_host: true

warn_network_host: true
warn_ipc_host: true
warn_root_user: true
warn_cap_add: true
warn_security_opt: true
warn_on_bind_outside_allowed_prefixes: true

deny_sensitive_mounts:
  - /
  - /etc
  - /root
  - /boot
  - /proc
  - /sys
  - /run
  - /var/run
  - /var/run/docker.sock

allow_device_exact:
  - /dev/nvidiactl
  - /dev/nvidia-uvm
  - /dev/nvidia-uvm-tools
  - /dev/nvidia-modeset
  - /dev/kfd
  - /dev/dri

allow_device_regex:
  - '^/dev/nvidia\d+$'
  - '^/dev/kfd$'
  - '^/dev/dri(/.*)?$'

allowed_abs_mount_prefixes:
  - /home
  - /tmp
  - /var/tmp
  - /data
  - /datasets
  - /models
  - /workspace
  - /srv
  - /mnt
  - /opt/projects

forbid_other_user_homes: true
